services:
  # ──────────────────────────────────────────────
  # VPN — Tout le trafic qBittorrent passe par ici
  # ──────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:${PORT_QBITTORRENT}:8080"
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=Finland
      - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12
      - BLOCK_MALICIOUS=on
      - BLOCK_ADS=off
      - DNS_KEEP_NAMESERVER=off
      - DNS_ADDRESS=1.1.1.1
      - FIREWALL_INPUT_PORTS=8080
    volumes:
      - ./config/gluetun:/gluetun
    tmpfs:
      - /tmp/gluetun
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://ipinfo.io/ip"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Client torrent — Derrière le VPN obligatoirement
  # ──────────────────────────────────────────────
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - QBIT_PASSWORD=${QBIT_PASSWORD:-}
    volumes:
      - ./config/qbittorrent:/config
      - ./config/qbittorrent/custom-services.d:/custom-services.d:ro
      - ${DATA_PATH}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Indexeurs torrent centralisés
  # ──────────────────────────────────────────────
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "127.0.0.1:9696:9696"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Gestion des séries TV
  # ──────────────────────────────────────────────
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ${DATA_PATH}:/data
    ports:
      - "127.0.0.1:8989:8989"
    depends_on:
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Gestion des films
  # ──────────────────────────────────────────────
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ${DATA_PATH}:/data
    ports:
      - "127.0.0.1:7878:7878"
    depends_on:
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Interface de demande utilisateur
  # ──────────────────────────────────────────────
  overseerr:
    image: linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/overseerr:/config
    ports:
      - "127.0.0.1:5055:5055"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Dashboard
  # ──────────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - TZ=${TZ}
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN}
      - HOMEPAGE_VAR_RADARR_KEY=${HOMEPAGE_RADARR_KEY}
      - HOMEPAGE_VAR_SONARR_KEY=${HOMEPAGE_SONARR_KEY}
      - HOMEPAGE_VAR_PROWLARR_KEY=${HOMEPAGE_PROWLARR_KEY}
      - HOMEPAGE_VAR_OVERSEERR_KEY=${HOMEPAGE_OVERSEERR_KEY}
      - HOMEPAGE_VAR_QBIT_PASSWORD=${QBIT_PASSWORD}
      - HOMEPAGE_VAR_HETZNER_VOLUME_PATH=${HETZNER_VOLUME_PATH}
      - HOMEPAGE_ALLOWED_HOSTS=home.${DOMAIN}
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HETZNER_VOLUME_PATH}:${HETZNER_VOLUME_PATH}:ro
    ports:
      - "127.0.0.1:7575:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Sync VPS → Freebox via SFTP sur tunnel WireGuard (toutes les 1 min)
  # ──────────────────────────────────────────────
  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    network_mode: host
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[`date '+%Y-%m-%d %H:%M:%S'`] Sync vers Freebox..."
          rclone move /source/films freebox:${FREEBOX_MEDIA_PATH} --config=/config/rclone/rclone.conf --transfers=2 --checkers=8 --buffer-size=64M --use-mmap --log-level=INFO --stats=60s --min-age=1m --exclude '*.part' --exclude '*.!qB' --exclude 'placeholder/**' --delete-empty-src-dirs
          rclone move /source/series freebox:${FREEBOX_MEDIA_PATH} --config=/config/rclone/rclone.conf --transfers=2 --checkers=8 --buffer-size=64M --use-mmap --log-level=INFO --stats=60s --min-age=1m --exclude '*.part' --exclude '*.!qB' --exclude 'placeholder/**' --delete-empty-src-dirs
          echo "[`date '+%Y-%m-%d %H:%M:%S'`] Sync terminé."
          sleep 10
        done
    volumes:
      - ${DATA_PATH}/media:/source
      - ./config/rclone:/config/rclone:ro
      - ./config/rclone/id_rsa:/root/.ssh/id_rsa:ro
    depends_on:
      - sonarr
      - radarr
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'rclone|sleep' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Protection brute-force SSH + nginx auth
  # ──────────────────────────────────────────────
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=${TZ}
      - F2B_LOG_LEVEL=INFO
    volumes:
      - /var/log:/var/log:ro
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - fail2ban_data:/var/lib/fail2ban
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep fail2ban || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Visualiseur de logs Docker (web)
  # ──────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    environment:
      - TZ=${TZ}
      - DOZZLE_NO_ANALYTICS=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:9999:8080"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Indexeurs Cloudflare via Jackett (Torrent9, etc.)
  # Prowlarr → Jackett → Byparr → site CF
  # ──────────────────────────────────────────────
  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - AUTO_UPDATE=true
    volumes:
      - ./config/jackett:/config
    ports:
      - "127.0.0.1:9117:9117"
    depends_on:
      - byparr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117/UI/Dashboard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Bypass Cloudflare pour Jackett
  # ──────────────────────────────────────────────
  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    volumes:
      - ./config/byparr:/app/data
    ports:
      - "127.0.0.1:8192:8191"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Authentification SSO — Portail unique pour tous les services
  # ──────────────────────────────────────────────
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    environment:
      - TZ=${TZ}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      - ./config/authelia:/config
    ports:
      - "127.0.0.1:9091:9091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Mise à jour automatique des images Docker
  # ──────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=discord://${DISCORD_WATCHTOWER_WEBHOOK_TOKEN}@${DISCORD_WATCHTOWER_WEBHOOK_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - "no-new-privileges:true"
    networks:
      - media_network
    restart: unless-stopped

volumes:
  fail2ban_data:

networks:
  media_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

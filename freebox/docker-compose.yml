services:
  # ──────────────────────────────────────────────
  # Plex Media Server — Lecture 4K direct play
  # ──────────────────────────────────────────────
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host
    environment:
      - PLEX_CLAIM=${PLEX_CLAIM}
      - ADVERTISE_IP=http://${FREEBOX_IP}:32400/
      - TZ=${TZ}
      - PLEX_UID=${PUID}
      - PLEX_GID=${PGID}
    volumes:
      - /opt/plex/config:/config
      - /opt/plex/transcode:/transcode
      - ${MEDIA_PATH}/films:/data/films:ro
      - ${MEDIA_PATH}/series:/data/series:ro
    # devices:
    #   - /dev/dri:/dev/dri   # Décommenter si GPU passthrough disponible
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # SFTP — Réception des fichiers depuis le VPS
  # Accessible uniquement via le tunnel WireGuard
  # ──────────────────────────────────────────────
  sftp:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: sftp
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SUDO_ACCESS=false
      - PASSWORD_ACCESS=false
      - USER_NAME=${SFTP_USER}
      - PUBLIC_KEY_FILE=/config/ssh/authorized_key
    ports:
      - "2222:2222"
    volumes:
      - ./config/sftp:/config
      - ${MEDIA_PATH}:/data
    restart: unless-stopped

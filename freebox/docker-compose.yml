services:
  # ──────────────────────────────────────────────
  # SFTP — Réception des fichiers depuis le VPS
  # Accessible uniquement via le tunnel WireGuard
  # ──────────────────────────────────────────────
  sftp:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: sftp
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SUDO_ACCESS=false
      - PASSWORD_ACCESS=false
      - USER_NAME=${SFTP_USER}
      - PUBLIC_KEY_FILE=/config/ssh/authorized_key
    ports:
      - "2222:2222"
    volumes:
      - ./config/sftp:/config
      - ${MEDIA_PATH}:/data
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Jellyfin — Serveur média (lecture locale + streaming distant)
  # Accessible en LAN pour le Player Devialet et via tunnel WireGuard
  # ──────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - TZ=${TZ}
    volumes:
      - ./config/jellyfin:/config
      - ./config/jellyfin/cache:/cache
      - ${MEDIA_PATH}:/media:ro
    ports:
      - "8096:8096"
    restart: unless-stopped
